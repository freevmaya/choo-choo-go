
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Чух чух поехали!</title>
  
  <!-- Bootstrap CSS -->
  <link href="./styles/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="./styles/bootstrap-icons.css?v=24">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="./styles/main.css?v=24">

  <!-- JQUERY -->
  <script src="./scripts/jquery-4.0.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

  <style type="text/css">

    html {
      position: fixed;      
    }

    hrml, body {
      width: 100vw;
      height: 100hw;
      overscroll-behavior-y: contain;
      overflow: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      touch-action: none;
    }
  </style>
  <script>
    function disablePullToRefresh() {
      // Предотвращаем стандартное поведение при скролле
      document.addEventListener('touchmove', function(event) {
          // Если свайп происходит вверху страницы и тянут вниз
          if (event.touches.length > 1 || event.scale !== 1) {
              return;
          }
          // Блокируем скролл тела документа
          event.preventDefault();
      }, { passive: false });

      // Дополнительно для iOS: блокировка "резинового" эффекта
      document.body.addEventListener('touchstart', function(event) {
          if (event.touches.length > 1) {
              event.preventDefault();
          }
      }, { passive: false });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', disablePullToRefresh);
    } else {
      disablePullToRefresh();
    }
  </script>

</head>
<body>
  <div class="loader">
    <div class="spinner-border" role="status">
    </div>
  </div>

  <!-- Основной контейнер игры -->
  <div id="game-container" class="start-blocking">

    <div class="game-ui">
      <div class="game-top">
        <div id="game-title" class="status"></div>
      </div>
      <div class="game-bottom">
        <div class="left">
        </div>
        <div class="tools-panel border-block">
          <div class="frame padding-2">
            <div class="s-view" id="state-score">
              <div class="status" data-lang="score_label">Счет</div>
              <div class="value">123</div>
            </div>
            <div class="s-view" id="state-vin">
              <div class="status" data-lang="wins_label">Поб.</div>
              <div class="value">123</div>
            </div>
            <div class="s-view" id="state-title">
              <div class="status" data-lang="title_label">Зван.</div>
              <div class="value">Рекрут</div>
            </div>
          </div>
        </div>
        <div class="right">
        </div>
      </div>

      <div id="tools" class="tools-panel border-block">
        <div class="frame padding-2">
          <span id="pause-btn" class="on" data-lang-title="pause">
            <i class="bi bi-pause-fill"></i>
          </span>
          <span id="music" class="on" data-lang-title="music">
            <i class="bi bi-music-note-beamed"></i>
          </span>
          <span id="volume" class="on" data-lang-title="sound">
            <i class="bi bi-volume-down"></i>
          </span>
          <span id="reboot-btn" class="on" data-lang-title="reboot">
            <i class="bi bi-bootstrap-reboot"></i>
          </span>
        </div>
      </div>

      <div class="tools-block">
        <div id="time" class="tools-panel border-block">
          <div class="frame padding">
            <span data-lang="leave-time">Осталось: </span><span class="time"></span>
          </div>
        </div>

        <!-- Индикатор очков -->
        <div class="tools-panel score-indicator border-block" id="score-indicator">
          <div class="frame padding">
            <i class="bi bi-database-fill"></i> <span data-lang="score_indicator">Счет:</span> <span class="current-score">0</span>
          </div>
        </div>

        <div id="inventory" class="tools-panel border-block hide">
          <div class="frame padding">
             <span onclick="" data-lang="inventory">Инвентарь</span>
          </div>
        </div>

        <div class="tools-panel border-block">
          <div class="frame padding">
             <span onclick="window.game.showShop()" data-lang="shop">Магазин</span>
          </div>
        </div>

        <div id="levels" class="tools-panel border-block">
          <div class="frame padding">
             <span onclick="window.game.showLevelsModal()" data-lang="levels">Уровни</span>
          </div>
        </div>
      </div>
    </div>
    
    <div id="game-canvas-container">
      <div id="canvas-container"></div>
    </div>
  </div>

  <div class="modal fade template" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="border-block tools-panel modal-content">
        <div class="frame">
          <div class="wrapper">
            <div class="top">
            </div>
            <div class="middle">
              <div class="dialog-content">
              </div>
            </div>
            <div class="bottom">            
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Подключаем Bootstrap JS глобально -->
  <script src="./scripts/bootstrap.bundle.min.js"></script>
  <script src="./scripts/three.min.js?v=24"></script>
  <script src="./scripts/main.mini.js"></script>
  
  <script>

    if (DEV) {

              console.log(...arguments);

          error(...arguments) {
              console.error(...arguments);

      }
      loadScript('./scripts/test-unit.js');
      loadScript('https://cdn.jsdelivr.net/npm/eruda', ()=>{
        eruda.init();
      });
    } else {
      var tracer = {
          log(...arguments) {},
          error(...arguments) {}
      }
    }
  </script>
  <script>
    window.game = new RailGame(StateManager);
  </script>
  </body>
</html>
